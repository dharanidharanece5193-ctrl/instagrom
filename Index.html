<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Login</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 320px;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 10px;
    background: #0095f6;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
    <h2>Demo Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    alert("This is a demo only. No credentials are collected.");
    window.close();
}
</script>

</body>
</html>
